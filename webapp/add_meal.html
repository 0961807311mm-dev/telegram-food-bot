<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Додати прийом їжі</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <button class="back-btn" onclick="goBack()">← Назад</button>
            <h1>📸 Додати прийом</h1>
            <div style="width: 40px;"></div>
        </header>
        
        <div class="camera-container">
            <div id="cameraPreview" class="camera-preview">
                <img id="photoPreview" style="display: none; max-width: 100%; border-radius: 16px;">
                <button id="takePhotoBtn" class="camera-btn" onclick="takePhoto()">
                    📷 Зробити фото
                </button>
            </div>
        </div>
        
        <div id="analysisResult" style="display: none;" class="analysis-card">
            <div class="loading-spinner" id="loadingSpinner">
                <div class="spinner"></div>
                <p>🔍 Аналізую фото через AI...</p>
            </div>
            <div id="analysisContent" style="display: none;">
                <h3>🍽️ Результат аналізу</h3>
                <div class="analysis-details">
                    <div class="analysis-field">
                        <label>Страва:</label>
                        <span id="mealName"></span>
                    </div>
                    <div class="analysis-field">
                        <label>Калорії:</label>
                        <input type="number" id="mealCalories" class="editable-input">
                    </div>
                    <div class="analysis-field">
                        <label>Білки (г):</label>
                        <input type="number" step="0.1" id="mealProtein" class="editable-input">
                    </div>
                    <div class="analysis-field">
                        <label>Жири (г):</label>
                        <input type="number" step="0.1" id="mealFat" class="editable-input">
                    </div>
                    <div class="analysis-field">
                        <label>Вуглеводи (г):</label>
                        <input type="number" step="0.1" id="mealCarbs" class="editable-input">
                    </div>
                    <div class="analysis-field">
                        <label>💡 Рекомендація:</label>
                        <p id="mealFeedback" class="feedback-text"></p>
                    </div>
                </div>
                <div class="action-buttons">
                    <button class="confirm-btn" onclick="confirmMeal()">✅ Підтвердити</button>
                    <button class="retake-btn" onclick="resetCamera()">🔄 Перезняти</button>
                </div>
            </div>
        </div>
        
        <div class="info-note">
            <p>📌 Порада: Фотографуйте їжу зверху, при хорошому освітленні для кращого розпізнавання</p>
        </div>
    </div>
    
    <script>
        const telegramId = new URLSearchParams(window.location.search).get('user_id');
        let currentPhotoFile = null;
        
        async function takePhoto() {
            // Використовуємо Telegram WebApp API для доступу до камери
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                
                tg.showPopup({
                    title: '📸 Фото їжі',
                    message: 'Зробіть фото вашої страви для аналізу',
                    buttons: [{type: 'ok'}, {type: 'cancel'}]
                });
                
                // Запускаємо камеру через input
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.capture = 'environment';
                
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        currentPhotoFile = file;
                        await analyzePhoto(file);
                    }
                };
                
                input.click();
            } else {
                // Fallback для десктопу
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        currentPhotoFile = file;
                        await analyzePhoto(file);
                    }
                };
                input.click();
            }
        }
        
        async function analyzePhoto(file) {
            // Показуємо прев'ю
            const preview = document.getElementById('photoPreview');
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            document.getElementById('takePhotoBtn').style.display = 'none';
            
            // Показуємо результат аналізу
            document.getElementById('analysisResult').style.display = 'block';
            document.getElementById('loadingSpinner').style.display = 'flex';
            document.getElementById('analysisContent').style.display = 'none';
            
            // Відправляємо на аналіз
            const formData = new FormData();
            formData.append('telegram_id', telegramId);
            formData.append('photo', file);
            
            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    body: formData
                });
                
                const analysis = await response.json();
                
                // Заповнюємо дані
                document.getElementById('mealName').innerText = analysis.name || 'Невідомо';
                document.getElementById('mealCalories').value = analysis.calories || 0;
                document.getElementById('mealProtein').value = analysis.protein || 0;
                document.getElementById('mealFat').value = analysis.fat || 0;
                document.getElementById('mealCarbs').value = analysis.carbs || 0;
                document.getElementById('mealFeedback').innerText = analysis.feedback || '✅ Гарний вибір!';
                
                // Показуємо контент
                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('analysisContent').style.display = 'block';
                
            } catch (error) {
                console.error('Analysis error:', error);
                document.getElementById('loadingSpinner').innerHTML = '<p>❌ Помилка аналізу. Спробуйте ще раз.</p>';
            }
        }
        
        async function confirmMeal() {
            const mealData = {
                telegram_id: parseInt(telegramId),
                photo_url: null,
                name: document.getElementById('mealName').innerText,
                calories: parseInt(document.getElementById('mealCalories').value) || 0,
                protein: parseFloat(document.getElementById('mealProtein').value) || 0,
                fat: parseFloat(document.getElementById('mealFat').value) || 0,
                carbs: parseFloat(document.getElementById('mealCarbs').value) || 0,
                feedback: document.getElementById('mealFeedback').innerText
            };
            
            try {
                const response = await fetch('/api/meals', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(mealData)
                });
                
                if (response.ok) {
                    if (window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.close();
                    }
                    window.location.href = `/?user_id=${telegramId}`;
                } else {
                    alert('Помилка збереження');
                }
            } catch (error) {
                console.error('Save error:', error);
                alert('Помилка збереження');
            }
        }
        
        function resetCamera() {
            document.getElementById('photoPreview').style.display = 'none';
            document.getElementById('takePhotoBtn').style.display = 'block';
            document.getElementById('analysisResult').style.display = 'none';
            currentPhotoFile = null;
        }
        
        function goBack() {
            window.location.href = `/?user_id=${telegramId}`;
        }
    </script>
</body>
</html>
